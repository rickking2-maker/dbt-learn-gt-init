models:
  - name: stg_jaffle_shop__customers
    description: one uninque customer per row
    columns:
      - name: customer_id
        description: the primary key
        data_tests:
          - not_null
          - unique

  - name: stg_jaffle_shop__orders
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: status
        description: '{{doc("order_status")}}'
        data_tests:
          - accepted_values:
              arguments:
                values: ['completed','placed','returned','return_pending','shipped']
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id