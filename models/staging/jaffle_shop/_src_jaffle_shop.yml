sources:
  - name: jaffle_shop
    description: A clone of a Postgres database
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: Raw customers data
        columns:
          - name: id
            description: primary key
            data_tests:
              - not_null
              - unique
      - name: orders
        config:
          freshness:
            warn_after: 
              count: 24
              period: hour
            error_after:
              count: 20
              period: day