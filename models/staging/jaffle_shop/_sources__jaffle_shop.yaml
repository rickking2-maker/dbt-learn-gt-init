sources:
  - name: jaffle_shop
    description: still not sure what a jaffle is
    database: raw
    schema: jaffle_shop
    
    tables:
      - name: customers
        columns:
          - name: id
            description: if this was a real database would not need to check unique pk :P
            data_tests:
              - unique
              - not_null
              
      - name: orders
        description: no one likes a stale order table
        +tags:
        - "daily"
        config: 
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 24
              period: hour
          loaded_at_field: _etl_loaded_at