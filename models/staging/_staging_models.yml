version: 2

models:
  - name: stg_jaffle_shop__orders
    description: One row per order from the `jaffle_shop` orders source, with source column names normalized for downstream models.
    columns:
      - name: order_id
        description: Stable identifier for each order.
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: Identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: order_date
        description: Date the order was placed.
      - name: status
        description: Order lifecycle status from the source system.

  - name: stg_jaffle_shop__products
    description: One row per product from the `jaffle_shop` products source, with source columns renamed for consistency.
    columns:
      - name: product_id
        description: Stable identifier for each product.
        data_tests:
          - not_null
          - unique
      - name: name
        description: Display name of the product.
      - name: price
        description: Product price from the source system.

  - name: stg_jaffle_shop__customers
    description: One row per customer from the `jaffle_shop` customers source, cleaned up for downstream joins and marts.
    columns:
      - name: customer_id
        description: Stable identifier for each customer.
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: Customer given name.
      - name: last_name
        description: Customer family name.
