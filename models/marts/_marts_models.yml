version: 2

models:
  - name: dim_customers
    description: One row per customer with first and most recent order dates plus an order count for customer-level analysis.
    columns:
      - name: customer_id
        description: Stable identifier for each customer.
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: Customer given name.
      - name: last_name
        description: Customer family name.
      - name: first_order_date
        description: Date of the first recorded order for the customer.
      - name: most_recent_order_date
        description: Date of the most recent recorded order for the customer.
      - name: number_of_orders
        description: Count of orders associated with the customer.
